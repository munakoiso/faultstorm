[program:process_freezer]
command=/usr/local/bin/process_freezer.sh
process_name=%(program_name)s
user=root
autostart=true
autorestart=true
startsecs=0
stopsignal=TERM
stdout_logfile=/var/log/process_freezer.log
stdout_logfile_maxbytes=0
stderr_logfile=/var/log/process_freezer.log
stderr_logfile_maxbytes=0
