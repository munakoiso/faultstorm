name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up venv and install dependencies
        run: make venv install-dev

      - name: Run linters
        run: make lint

  mypy:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up venv and install dependencies
        run: make venv install-dev

      - name: Run mypy
        run: make mypy

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up venv and install dependencies
        run: make venv install-dev

      - name: Run unit tests
        run: make test-unit

  integration-tests:
    name: Integration tests (behave)
    runs-on: ubuntu-latest
    needs: [lint, mypy, unit-tests]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up venv and install dependencies
        run: make venv install-dev

      - name: Run behave tests
        run: make test-behave

      - name: Tear down containers
        if: always()
        run: make test-down
